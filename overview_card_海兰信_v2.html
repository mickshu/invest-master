body { font-family: "NotoSansSC", sans-serif; background: #1a1a2e; padding: 20px; display: flex; justify-content: center; }
.card { width: 820px; background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); border-radius: 16px; padding: 32px; color: #e0e0e0; border: 1px solid rgba(255,255,255,0.1); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 28px; color: #fff; }
.header .tag { background: #e94560; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 13px; }
.header .tag2 { background: #533483; padding: 4px 12px; border-radius: 4px; font-size: 13px; margin-left: 8px; }
.stars { display: flex; gap: 24px; margin-bottom: 16px; }
.star-item { flex: 1; text-align: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
.star-item .label { font-size: 13px; color: #aaa; margin-bottom: 4px; }
.star-item .score { font-size: 22px; color: #ffd700; }
.rating-box { display: flex; justify-content: space-between; background: rgba(233,69,96,0.15); border: 1px solid #e94560; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.rating-left { text-align: left; }
.rating-left .main { font-size: 32px; color: #e94560; font-weight: bold; }
.rating-left .sub { font-size: 13px; color: #aaa; margin-top: 4px; }
.rating-right { text-align: right; }
.rating-right .price { font-size: 28px; color: #fff; }
.rating-right .margin { font-size: 13px; color: #e94560; margin-top: 4px; }
.data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.data-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
.data-item .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.data-item .value { font-size: 16px; color: #fff; font-weight: bold; }
.data-item .value.red { color: #ff4444; }
.data-item .value.green { color: #00cc66; }
.cashflow { display: flex; gap: 12px; margin-bottom: 16px; }
.cf-item { flex: 1; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
.cf-item .label { font-size: 11px; color: #888; margin-bottom: 4px; }
.cf-item .value { font-size: 14px; font-weight: bold; }
.cf-item .value.positive { color: #00cc66; }
.cf-item .value.negative { color: #ff4444; }
.consensus { text-align: center; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
.consensus .label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
.consensus .result { font-size: 18px; }
.consensus .buy { color: #00cc66; }
.consensus .hold { color: #ffd700; }
.consensus .sell { color: #ff4444; }
.risk-badge { display: inline-block; background: #ff4444; color: #fff; padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; }
</style>
</head>
